services:
  - type: web
    name: claudia-alzate-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: cd ../.. && npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
