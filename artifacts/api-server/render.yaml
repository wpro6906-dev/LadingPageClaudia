services:
  - type: web
    name: claudia-alzate-api
    runtime: node
    buildCommand: cd ../.. && npx pnpm@9 install && npx pnpm@9 --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
